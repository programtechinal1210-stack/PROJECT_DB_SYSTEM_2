version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: project_db_postgres
    environment:
      POSTGRES_DB: CoreDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - project_network

  redis:
    image: redis:7-alpine
    container_name: project_db_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - project_network

volumes:
  postgres_data:
  redis_data:

networks:
  project_network:
    driver: bridge