# =============================================
# FILE: docker/redis.conf
# PURPOSE: إعدادات Redis
# =============================================

# Bind address
bind 0.0.0.0

# Protected mode
protected-mode yes

# Port
port 6379

# Require password
requirepass Redis@123456

# Persistence
save 900 1
save 300 10
save 60 10000

# Max memory policy
maxmemory 512mb
maxmemory-policy allkeys-lru

# Append only file
appendonly yes
appendfilename "appendonly.aof"

# Logging
loglevel notice
logfile ""
