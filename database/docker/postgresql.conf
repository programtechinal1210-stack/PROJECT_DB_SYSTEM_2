# =============================================
# FILE: docker/postgresql.conf
# PURPOSE: إعدادات PostgreSQL المحسنة
# =============================================

# Connection Settings
listen_addresses = '*'
max_connections = 200

# Memory Settings
shared_buffers = 1GB
work_mem = 32MB
maintenance_work_mem = 256MB
effective_cache_size = 3GB

# Write Ahead Log
wal_level = replica
max_wal_senders = 10
wal_keep_size = 1GB

# Checkpoint Settings
checkpoint_timeout = 15min
max_wal_size = 4GB
min_wal_size = 1GB

# Query Planning
random_page_cost = 1.1
effective_io_concurrency = 200

# Statistics
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# Autovacuum
autovacuum = on
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# Locale
lc_messages = 'ar_SA.UTF-8'
lc_monetary = 'ar_SA.UTF-8'
lc_numeric = 'ar_SA.UTF-8'
lc_time = 'ar_SA.UTF-8'

# Timezone
timezone = 'Asia/Riyadh'

# Logging
log_destination = 'stderr'
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_statement = 'ddl'
log_min_duration_statement = 5000
